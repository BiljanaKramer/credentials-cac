---
- name: Bootstrap OAuth application credentials
  hosts: localhost
  gather_facts: false
  vars:
    oauth_app_name: "cac-ci-client-2"
    oauth_org_name: "Default"

  tasks:
    - name: Create OAuth application
      ansible.platform.application:
        name: "{{ oauth_app_name }}"
        organization: "{{ oauth_org_name }}"
        client_type: confidential          # required for client_secret
        authorization_grant_type: password
        description: "CaC automation client"
        state: present
        aap_hostname: "{{ gateway_hostname }}"
        aap_username: "{{ gateway_username }}"
        aap_password: "{{ gateway_password }}"
        aap_validate_certs: false
      register: oauth_app
      no_log: false

    - name: Fail if app existed but we have no stored secret
      ansible.builtin.fail:
        msg: >
          Application already exists (changed=false) and no client_secret was returned.
          Load credentials from vault, or delete the app and re-run bootstrap to rotate.
      when:
        - not oauth_app.changed
        - oauth_app.client_secret is not defined or oauth_app.client_secret == '$encrypted$'

    - name: Ensure group_vars/all exists
      ansible.builtin.file:
        path: "{{ playbook_dir }}/group_vars/all"
        state: directory
        mode: "0750"        

    - name: Persist credentials to encrypted vault file
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/group_vars/all/oauth_credentials.yml"
        mode: "0600"
        content: |
          vault_oauth_client_id: "{{ oauth_app.client_id }}"
          vault_oauth_client_secret: "{{ oauth_app.client_secret }}"
      when: oauth_app.changed
      no_log: false

    - name: Set facts for remainder of this playbook run
      ansible.builtin.set_fact:
        oauth_client_id: "{{ oauth_app.client_id }}"
        oauth_client_secret: "{{ oauth_app.client_secret }}"

        - name: Load OAuth credentials from vault
      ansible.builtin.set_fact:
        oauth_client_id: "{{ vault_oauth_client_id }}"
        oauth_client_secret: "{{ vault_oauth_client_secret }}"
      no_log: false

    - name: Obtain access token via password grant
      ansible.builtin.uri:
        url: "https://{{ gateway_hostname }}/o/token/"
        method: POST
        body_format: form-urlencoded
        body:
          grant_type: password
          client_id: "{{ oauth_client_id }}"
          client_secret: "{{ oauth_client_secret }}"
          username: "{{ service_account_user }}"
          password: "{{ service_account_password }}"
        return_content: true
        status_code: 200
      register: token_response
      no_log: false

    - name: Set gateway token for downstream collection modules
      ansible.builtin.set_fact:
        gateway_token: "{{ token_response.json.access_token }}"
      no_log: false

    - name: Example — use token in subsequent CaC tasks
      ansible.platform.organization:
        name: "My Org"
        state: present
        gateway_hostname: "{{ gateway_hostname }}"
        gateway_token: "{{ gateway_token }}"
      when: oauth_app.changed
      no_log: false
